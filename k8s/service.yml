apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: foodapp
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: foodapp
spec:
  selector:
    app: backend
  ports:
    - port: 3000
---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: foodapp
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
