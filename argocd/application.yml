apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foodapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Praveen48589/Food-Order-Website.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: foodapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true