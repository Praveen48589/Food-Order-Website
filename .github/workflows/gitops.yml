name: docker build

on:
    workflow_call:

permissions:
  contents: write


jobs:
    build-push:
        env:
            DOCKERHUB_USERNAME: ${{vars.DOCKERHUB_USERNAME}}
            DOCKER_TAG: ${{github.sha}}
        runs-on: ubuntu-latest
        steps:

            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Login To Dockerhub
              uses: docker/login-action@v4
              with:
                username: ${{vars.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: Docker build && push for frontend
              uses: docker/build-push-action@v6
              with:
                context: ./frontend
                push: true
                tags: ${{vars.DOCKERHUB_USERNAME}}/frontend:${{github.sha}}

            - name: Docker build && push for backend
              uses: docker/build-push-action@v6
              with:
                context: ./backend
                push: true
                tags: ${{vars.DOCKERHUB_USERNAME}}/backend:${{github.sha}}

            - name: Update Kubernetes manifests
              run: |
                sed -i "s|image: ${{ vars.DOCKERHUB_USERNAME }}/frontend:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}|" k8s/frontend-deployment.yml
                sed -i "s|image: ${{ vars.DOCKERHUB_USERNAME }}/backend:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}|" k8s/backend-deployment.yml
             
            - name: Commit updated manifests
              run: |
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"

                git add k8s/frontend-deployment.yml
                git add k8s/backend-deployment.yml

                git diff --staged --quiet || git commit -m "ci: update images to ${{ github.sha }} [skip ci]"

                git push
           


