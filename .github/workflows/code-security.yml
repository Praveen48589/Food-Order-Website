name: Code quality

on:
    workflow_call:
 

jobs:
    validate: 
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: ["20","22"]

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup NodeJs
            uses: actions/setup-node@v4
            with: 
              node-version: ${{matrix.node-version}}

          - name: Install dependencies
            run: npm install

          - name: Run Biome
            run: npx @biomejs/biome check .
            
          - name: Run Semgrep  # for security
            uses: returntocorp/semgrep-action@v1
            with:
              config: auto

